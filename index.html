<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Journey of the Sailing Vessel Charlotte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="header-lead">
    <button type="button" class="header-vessel-btn" id="vessel-image-btn" hidden aria-label="View photo of Charlotte">
      <img class="header-vessel" id="vessel-image" alt="" />
    </button>
    <div class="header-brand">
    <h1 class="header-title" id="site-title">Journey of the Sailing Vessel <em>Charlotte</em></h1>
    <p class="header-tagline" id="site-tagline">Circumnavigating the Globe · 2001–2005</p>
    </div>
  </div>
  <div class="header-actions">
    <span class="header-dates" id="site-dates"></span>
    <button type="button" class="btn-header" id="btn-gallery-index" aria-haspopup="dialog">
      <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z"/></svg>
      Photo Galleries
      <span class="btn-badge" id="gallery-badge" hidden></span>
    </button>
  </div>
</header>

<div class="layout">
  <div id="map" role="application" aria-label="Voyage route map"></div>
  <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="Resize map and log panels"></div>
  <div class="log" id="log"></div>
</div>

<div class="gallery-overlay" id="gallery-index-overlay" hidden>
  <div class="gallery-panel gallery-index-panel" role="dialog" aria-modal="true" aria-labelledby="gallery-index-title">
    <div class="gallery-head">
      <h2 class="gallery-title" id="gallery-index-title">Trip Photo Galleries</h2>
      <button type="button" class="gallery-close" id="gallery-index-close" aria-label="Close">&times;</button>
    </div>
    <p class="gallery-index-intro">One album per anchorage along the route. Thumbnails are shown here; full-resolution collections open on Amazon Photos (or your linked album).</p>
    <div class="gallery-index-list" id="gallery-index-list"></div>
  </div>
</div>

<div class="scan-lightbox" id="scan-lightbox" hidden role="dialog" aria-modal="true" aria-label="Logbook scan full size">
  <img id="scan-lightbox-img" alt="" />
</div>

<div class="gallery-overlay" id="gallery-overlay" hidden>
  <div class="gallery-panel" role="dialog" aria-modal="true" aria-label="Trip photos">
    <div class="gallery-head">
      <h2 class="gallery-title" id="gallery-title"></h2>
      <button type="button" class="gallery-close" id="gallery-close" aria-label="Close">&times;</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <p class="gallery-external" id="gallery-external" hidden></p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>
</body>
</html>
